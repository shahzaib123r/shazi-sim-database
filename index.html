<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SHAZI Search</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, #32004f 0%, transparent 25%),
        radial-gradient(circle at bottom right, #001e4d 0%, transparent 30%),
        #040816;
      color: white;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 45px 45px;
      animation: gridMove 20s linear infinite;
      z-index: -2;
    }

    @keyframes gridMove {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(-45px, -45px);
      }
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: .4;
      z-index: -1;
      animation: move 15s infinite alternate ease-in-out;
    }

    .blob1 {
      width: 300px;
      height: 300px;
      background: #00d9ff;
      top: 5%;
      left: 5%;
    }

    .blob2 {
      width: 350px;
      height: 350px;
      background: #9b00ff;
      bottom: 5%;
      right: 5%;
    }

    @keyframes move {
      from {
        transform: translateY(0px) translateX(0px);
      }

      to {
        transform: translateY(40px) translateX(30px);
      }
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: auto;
      padding: 35px 20px;
    }

    .top {
      text-align: center;
      margin-top: 30px;
      animation: fadeTop 1s ease;
    }

    @keyframes fadeTop {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-size: 70px;
      font-weight: 800;
      background: linear-gradient(90deg, #00d9ff, #b300ff, #ff00aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
      text-shadow: 0 0 25px rgba(0, 217, 255, .25);
    }

    .sub {
      margin-top: 10px;
      color: #c8c8c8;
      font-size: 18px;
    }

    .search-panel {
      margin-top: 45px;
      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 30px;
      padding: 25px;
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, .45);
      animation: fadePanel 1.2s ease;
    }

    @keyframes fadePanel {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .search-box {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .search-box input {
      flex: 1;
      height: 70px;
      border: none;
      outline: none;
      border-radius: 22px;
      background: rgba(0, 0, 0, .35);
      border: 1px solid rgba(255,255,255,.08);
      color: white;
      font-size: 18px;
      padding: 0 25px;
      transition: .3s;
    }

    .search-box input:focus {
      border-color: #00d9ff;
      box-shadow: 0 0 20px rgba(0,217,255,.25);
    }

    .search-box input::placeholder {
      color: #999;
    }

    .search-btn {
      width: 180px;
      height: 70px;
      border: none;
      border-radius: 22px;
      background: linear-gradient(135deg, #00d9ff, #7b00ff);
      color: white;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: .3s;
      position: relative;
      overflow: hidden;
    }

    .search-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,217,255,.25);
    }

    .search-btn::before {
      content: "";
      position: absolute;
      width: 120px;
      height: 200%;
      background: rgba(255,255,255,.25);
      transform: rotate(25deg);
      left: -140px;
      top: -50px;
      transition: .6s;
    }

    .search-btn:hover::before {
      left: 220px;
    }

    .loading {
      display: none;
      margin-top: 25px;
      text-align: center;
      color: #d7d7d7;
      font-size: 16px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: #00d9ff;
      border-radius: 50%;
      margin: auto;
      margin-bottom: 10px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .results {
      margin-top: 35px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 28px;
      overflow: hidden;
      backdrop-filter: blur(15px);
      position: relative;
      animation: cardShow .5s ease;
      transition: .3s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }

    @keyframes cardShow {
      from {
        opacity: 0;
        transform: translateY(25px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-top {
      padding: 25px;
      background: linear-gradient(135deg,
          rgba(0,217,255,.18),
          rgba(179,0,255,.18));
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .profile {
      width: 75px;
      height: 75px;
      border-radius: 24px;
      background: linear-gradient(135deg,#00d9ff,#7b00ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .card-top h2 {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .network {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 40px;
      background: rgba(255,255,255,.08);
      font-size: 13px;
      color: #cdefff;
    }

    .card-body {
      padding: 25px;
    }

    .field {
      margin-bottom: 18px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(0,0,0,.22);
      border: 1px solid rgba(255,255,255,.05);
      transition: .3s;
    }

    .field:hover {
      background: rgba(255,255,255,.06);
    }

    .label {
      font-size: 12px;
      color: #9f9f9f;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .value {
      font-size: 17px;
      font-weight: 600;
      word-break: break-word;
    }

    .copy-btn {
      width: 100%;
      height: 55px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg,#00d9ff,#7b00ff);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: .3s;
    }

    .copy-btn:hover {
      transform: scale(1.02);
    }

    .footer {
      margin-top: 40px;
      text-align: center;
      color: #8d8d8d;
      font-size: 14px;
      line-height: 1.6;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
      color: #8d8d8d;
      text-decoration: none;
      transition: color .2s ease;
    }

    .repo-link:hover {
      color: #00d9ff;
    }

    .repo-link svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    @media(max-width:700px) {

      .logo {
        font-size: 42px;
      }

      .search-box {
        flex-direction: column;
      }

      .search-btn {
        width: 100%;
      }

      .search-box input {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="container">

    <div class="top">
      <div class="logo">SHAZI SIM DATABASE</div>

      <div class="sub">
        Advanced Information Dashboard
      </div>
    </div>

    <div class="search-panel">

      <div class="search-box">

        <input type="text"
          id="number"
          placeholder="Enter number here with 0">

        <button class="search-btn"
          onclick="searchData()">
          SEARCH
        </button>

      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        Searching Database...
      </div>

      <div class="results"
        id="results"></div>

    </div>

    <div class="footer">
      POWERED BY SHAHZAIB
      <a class="repo-link" href="https://github.com/shahzaib123r/shazi-sim-database" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 0.297C5.373 0.297 0 5.67 0 12.299c0 5.292 3.438 9.786 8.205 11.387.6.111.82-.261.82-.579 0-.286-.011-1.042-.017-2.047-3.338.726-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.089-.745.083-.73.083-.73 1.205.085 1.839 1.238 1.839 1.238 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.76-1.605-2.665-.303-5.467-1.332-5.467-5.93 0-1.31.468-2.381 1.236-3.221-.124-.303-.536-1.524.117-3.176 0 0 1.008-.322 3.301 1.23a11.51 11.51 0 0 1 3.003-.404c1.018.005 2.045.138 3.003.404 2.29-1.552 3.296-1.23 3.296-1.23.655 1.652.243 2.873.119 3.176.77.84 1.234 1.911 1.234 3.221 0 4.61-2.807 5.624-5.479 5.921.43.372.815 1.102.815 2.222 0 1.605-.015 2.898-.015 3.293 0 .32.216.694.825.576C20.565 22.081 24 17.59 24 12.299 24 5.67 18.627.297 12 .297z" />
        </svg>
        View on GitHub
      </a>
    </div>

  </div>

  <script>

    async function searchData() {

      const number =
        document.getElementById("number").value;

      const results =
        document.getElementById("results");

      const loading =
        document.getElementById("loading");

      if (number == "") {
        alert("Enter number");
        return;
      }

      results.innerHTML = "";
      loading.style.display = "block";

      try {

        


       const response = await fetch(
  `https://sim-info-api.wasif-ali.workers.dev/?search=${number}`
);

const data = await response.json();


        loading.style.display = "none";

        data.records.forEach(user => {

          results.innerHTML += `

          <div class="card">

            <div class="card-top">

              <div class="profile">
                ${user.name.charAt(0)}
              </div>

              <h2>${user.name}</h2>

              <div class="network">
                ${user.network}
              </div>

            </div>

            <div class="card-body">

              <div class="field">
                <div class="label">
                  MOBILE NUMBER
                </div>

                <div class="value">
                  ${user.mobile}
                </div>
              </div>

              <div class="field">
                <div class="label">
                  CNIC NUMBER
                </div>

                <div class="value">
                  ${user.cnic}
                </div>
              </div>

              <div class="field">
                <div class="label">
                  ADDRESS
                </div>

                <div class="value">
                  ${user.address}
                </div>
              </div>

              <button class="copy-btn"
                onclick='copyData(${JSON.stringify(user)})'>

                COPY DATA

              </button>

            </div>

          </div>

          `;

        });

      } catch (err) {

        loading.style.display = "none";

        alert("Error loading data");

        console.log(err);

      }

    }

    function copyData(user) {

      const text =

`Name: ${user.name}
Mobile: ${user.mobile}
CNIC: ${user.cnic}
Address: ${user.address}
Network: ${user.network}`;

      navigator.clipboard.writeText(text);

      alert("Copied");

    }

  </script>

</body>

</html>
